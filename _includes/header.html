<header class="site-header" id="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand-mark">M</span>
      <span>M. Troynin</span>
      <span class="brand-suffix">/ docs</span>
    </a>

    <nav class="nav" id="main-nav">
      {% for link in site.data.navigation %}
      <a href="{{ link.url | relative_url }}"
         class="nav-link{% if page.url == link.url %} is-active{% endif %}">
        {{ link.title }}
      </a>
      {% endfor %}
    </nav>

    <div class="header-tools">
      <a class="button button-secondary button-sm" href="{{ '/contact/' | relative_url }}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download CV
      </a>
      <button class="icon-btn menu-toggle" id="menu-toggle" aria-label="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
</header>
