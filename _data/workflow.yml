principles:
  - title: "AI drafts. Code decides."
    body: "Source code, OpenAPI, server logs and SME interviews are ground truth. AI output is treated as a hypothesis until verified."
  - title: "Review checklist beats vibes."
    body: "Every doc passes a short checklist: claims verified, examples runnable, terms consistent, edge cases mentioned."
  - title: "Same workflow for repeat work."
    body: "Templates and prompts are reusable, so the second API doc costs less than the first."

checklist:
  - "Every code snippet was copy-pasted from the actual codebase or run locally."
  - "Every API example returns the documented status code and shape."
  - "All endpoints, parameters and types match the OpenAPI source."
  - "All version numbers, package names and CLI flags were confirmed in the repo."
  - "Acronyms are expanded on first use."
  - "Terms match the product UI and the engineering team's vocabulary."
  - "An SME reviewed the doc before publication."
  - "Edge cases and error states are covered."

prompts:
  - name: "api-endpoint-draft.md"
    stage: "DRAFT"
    body: >
      You are a technical writer. Given the OpenAPI spec below,
      generate a Markdown endpoint reference that includes:
      method + path, description, parameters table, request example
      (curl), response example (JSON), error codes.
      Flag anything ambiguous with [VERIFY].

  - name: "code-review-questions.md"
    stage: "RESEARCH"
    body: >
      I'm documenting the module {{module_name}}.
      Based on the source code below, generate 5 questions I should
      ask the owning engineer to clarify intent, edge cases,
      and undocumented behavior.

  - name: "hallucination-check.md"
    stage: "VALIDATE"
    body: >
      Compare the draft documentation below against the source code.
      For each technical claim, respond with:
      ✅ Confirmed — cite the file and line.
      ❌ Not found — flag for manual review.
      ⚠️ Ambiguous — explain why.
