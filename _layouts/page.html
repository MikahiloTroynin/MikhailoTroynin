---
layout: default
---
<main>
  <div class="container page-header">
    {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
  </div>

  <section class="container" style="padding-bottom: 80px;">
    {{ content }}
  </section>
</main>
